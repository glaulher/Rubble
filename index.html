<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://challenges.cloudflare.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-src https://challenges.cloudflare.com"
    />

    <title>Rubble</title>

    <link rel="icon" type="image/png" href="/image/Monster.png" />

    <link rel="stylesheet" href="/public/css/fonts.css" />
    <link rel="stylesheet" href="/public/css/default.css" />

    <style>
      #sidebar[data-collapsed='false'] .sidebar-tooltip {
        display: none;
      }
    </style>

    <script src="/public/style.js"></script>
  </head>

  <body
    class="min-h-screen flex flex-col"
    style="
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(90deg, #b9abd9 0%, #d8e7fd 50%, #fde1f0 100%);
    "
  >
    <!-- TOP BAR -->
    <header class="fixed top-0 left-0 right-0 bg-slate-900 z-50 h-14">
      <div class="flex items-center justify-between h-full px-6">
        <div class="flex items-center gap-3">
          <img src="/image/Monster.png" class="w-10 h-10 object-contain" />
          <div>
            <div class="text-white font-semibold tracking-wide -mb-0.5">
              Rubble
            </div>
            <div class="text-slate-400 text-[10px] leading-tight">
              Data Mining
            </div>
          </div>
        </div>
        <div id="userDisplay">
          <a
            href="#/login"
            class="text-blue-400 hover:text-blue-300 text-sm font-medium"
          >
            Entrar
          </a>
        </div>
      </div>
    </header>

    <!-- SIDEBAR -->
    <aside
      id="sidebar"
      class="fixed left-0 bg-slate-900 flex flex-col z-0 transition-all duration-300"
      data-collapsed="true"
      style="top: 56px; bottom: 0; width: 56px; display: none"
    >
      <button
        id="sidebarToggle"
        class="self-end mr-2 mt-3 mb-2 w-9 h-9 flex items-center justify-center rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all duration-300"
      >
        <svg
          id="sidebarToggleIcon"
          class="w-5 h-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <nav class="flex flex-col gap-1 px-3 mt-2">
        <a
          href="#/"
          data-role="admin supervisor coordenador cliente"
          class="sidebar-link flex items-center gap-3 px-3 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white font-medium transition whitespace-nowrap relative group"
        >
          <svg
            class="w-5 h-5 shrink-0"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span
            class="sidebar-label transition-opacity duration-300"
            style="display: none; opacity: 0"
          >
            Home
          </span>
          <span
            class="sidebar-tooltip absolute left-full ml-2 top-1/2 -translate-y-1/2 scale-0 group-hover:scale-100 origin-left transition-transform duration-200 bg-slate-900 text-white text-xs px-3 py-2 rounded-lg whitespace-nowrap shadow-lg border border-slate-600 z-50"
          >
            Home
          </span>
        </a>
        <!-- Dashboard with submenu -->
        <div
          data-role="admin supervisor coordenador"
          class="relative group"
          id="dashboardMenuContainer"
        >
          <a
            href="#"
            class="sidebar-link flex items-center gap-3 px-3 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white font-medium transition whitespace-nowrap relative"
            id="dashboardMenuToggle"
          >
            <svg
              class="w-5 h-5 shrink-0"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span
              class="sidebar-label transition-opacity duration-300"
              style="display: none; opacity: 0"
            >
              Dashboard
            </span>
          </a>
          <!-- Submenu -->
          <div
            id="dashboardSubmenu"
            class="hidden group-hover:block absolute left-full top-0 bg-slate-900 text-white rounded-xl shadow-lg border border-slate-600 z-50 py-2 px-1 min-w-[180px]"
          >
            <a
              href="#/equipament-dashboard"
              data-role="admin supervisor coordenador"
              class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white text-sm whitespace-nowrap"
            >
              <svg
                class="w-4 h-4 shrink-0"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
              </svg>
              <span>Equipamentos</span>
            </a>
            <a
              href="#/pv-dashboard"
              data-role="admin coordenador"
              class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white text-sm whitespace-nowrap"
            >
              <svg
                class="w-4 h-4 shrink-0"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 20V10"></path>
                <path d="M18 20V4"></path>
                <path d="M6 20v-4"></path>
              </svg>
              <span>PV</span>
            </a>
          </div>
        </div>
        <a
          href="#/pv"
          data-role="admin coordenador"
          class="sidebar-link flex items-center gap-3 px-3 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white font-medium transition whitespace-nowrap relative group"
        >
          <svg
            class="w-5 h-5 shrink-0"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            ></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          <span
            class="sidebar-label transition-opacity duration-300"
            style="display: none; opacity: 0"
          >
            PV
          </span>
          <span
            class="sidebar-tooltip absolute left-full ml-2 top-1/2 -translate-y-1/2 scale-0 group-hover:scale-100 origin-left transition-transform duration-200 bg-slate-900 text-white text-xs px-3 py-2 rounded-lg whitespace-nowrap shadow-lg border border-slate-600 z-50"
          >
            PV
          </span>
        </a>
        <a
          href="#/equipment-manager"
          data-role="admin coordenador"
          class="sidebar-link flex items-center gap-3 px-3 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white font-medium transition whitespace-nowrap relative group"
        >
          <svg
            class="w-5 h-5 shrink-0"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
            <line x1="6" y1="6" x2="6.01" y2="6"></line>
            <line x1="6" y1="18" x2="6.01" y2="18"></line>
          </svg>
          <span
            class="sidebar-label transition-opacity duration-300"
            style="display: none; opacity: 0"
          >
            Equip.
          </span>
          <span
            class="sidebar-tooltip absolute left-full ml-2 top-1/2 -translate-y-1/2 scale-0 group-hover:scale-100 origin-left transition-transform duration-200 bg-slate-900 text-white text-xs px-3 py-2 rounded-lg whitespace-nowrap shadow-lg border border-slate-600 z-50"
          >
            Equip.
          </span>
        </a>
        <a
          href="#/users"
          data-role="admin"
          class="sidebar-link flex items-center gap-3 px-3 py-3 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white font-medium transition whitespace-nowrap relative group"
        >
          <svg
            class="w-5 h-5 shrink-0"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          <span
            class="sidebar-label transition-opacity duration-300"
            style="display: none; opacity: 0"
          >
            Usuários
          </span>
          <span
            class="sidebar-tooltip absolute left-full ml-2 top-1/2 -translate-y-1/2 scale-0 group-hover:scale-100 origin-left transition-transform duration-200 bg-slate-900 text-white text-xs px-3 py-2 rounded-lg whitespace-nowrap shadow-lg border border-slate-600 z-50"
          >
            Usuários
          </span>
        </a>
      </nav>
    </aside>

    <div
      id="app"
      class="flex-1 transition-all duration-300"
      style="margin-left: 56px; padding-top: 56px"
    ></div>

    <!-- SCRIPTS -->
    <script src="/public/js/components/sidebar.js?v=1"></script>
    <script src="/public/js/auth.js?v=1"></script>
    <script src="/public/js/lib/chart.umd.min.js?v=1"></script>
    <script src="/public/js/lib/html2canvas.min.js?v=1"></script>
    <script src="/public/js/lib/jspdf.umd.min.js?v=1"></script>
    <script src="/public/js/utils/utils.js?v=1"></script>
    <script src="/public/js/utils/polling.js?v=1"></script>
    <script src="/public/js/components/modal.js?v=1"></script>
    <script src="/public/js/components/messagebox.js?v=1"></script>
    <script src="/public/js/components/pagination.js?v=1"></script>
    <script src="/public/js/utils/csv.js?v=1"></script>
    <script src="/public/js/utils/upload.js?v=5"></script>
    <script src="/public/js/utils/report.js?v=1"></script>
    <script src="/public/js/home/home-ui.js?v=1"></script>
    <script src="/public/js/home/equipment.js?v=1"></script>
    <script src="/public/js/home/form.js?v=1"></script>
    <script src="/public/js/dashboard/equipamentDashboard.js?v=1"></script>
    <script src="/public/js/dashboard/pvDashboard.js?v=1"></script>
    <script src="/public/js/pv/constants.js?v=5"></script>
    <script src="/public/js/pv/form-utils.js?v=6"></script>
    <script src="/public/js/pv/form-item-row.js?v=1"></script>
    <script src="/public/js/pv/form-autocomplete.js?v=1"></script>
    <script src="/public/js/pv/form-filter.js?v=1"></script>
    <script src="/public/js/pv/list.js?v=1"></script>
    <script src="/public/js/pv/modals.js?v=6"></script>
    <script src="/public/js/pv/modal-email.js?v=1"></script>
    <script src="/public/js/pv/pdf-export.js?v=1"></script>
    <script src="/public/js/pv/csv-export.js?v=1"></script>
    <script src="/public/js/pv/form.js?v=6"></script>
    <script src="/public/js/user/list.js?v=1"></script>
    <script src="/public/js/user/form.js?v=1"></script>
    <script src="/public/js/equipment-manager/list.js?v=1"></script>
    <script src="/public/js/equipment-manager/form.js?v=1"></script>
    <script src="/public/js/router.js?v=1"></script>

    <!-- TOAST -->
    <div id="toast" class="fixed top-[18%] right-6 z-[999999] hidden">
      <div
        id="toastBox"
        class="bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl border border-slate-700 min-w-[280px] transition-all duration-300"
      >
        <div class="flex items-center gap-3">
          <div id="toastIcon" class="w-3 h-3 rounded-full bg-emerald-400"></div>

          <span id="toastMessage">Mensagem</span>
        </div>
        <div id="toastProgress" class="hidden mt-3">
          <div class="w-full bg-slate-700 rounded-full h-2">
            <div
              id="toastProgressBar"
              class="bg-sky-400 h-2 rounded-full transition-all duration-300"
              style="width: 0%"
            ></div>
          </div>
          <span
            id="toastProgressLabel"
            class="text-xs text-slate-400 mt-1 block"
          ></span>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="bg-slate-900 border-t border-slate-800 relative z-10">
      <div class="max-w-7xl mx-auto px-6 py-8">
        <div
          class="flex flex-col md:flex-row items-center justify-between gap-4"
        >
          <!-- LOGO / NOME -->
          <div class="flex items-center gap-3">
            <img
              src="/image/Monster.png"
              class="w-10 h-10 object-contain opacity-90"
            />

            <div>
              <h3 class="text-white font-semibold tracking-wide">Rubble</h3>

              <p class="text-slate-400 text-sm">Data Mining Platform</p>
            </div>
          </div>

          <!-- INFO -->
          <div class="text-center">
            <p class="text-slate-400 text-sm">
              Developed by
              <span class="text-blue-400 font-medium">GRM Medeiros</span>
            </p>

            <p class="text-slate-500 text-xs mt-1">
              glaulher.developer@gmail.com
            </p>
          </div>

          <!-- STATUS -->
          <div>
            <span
              class="inline-flex items-center gap-2 bg-blue-500/10 text-blue-300 px-4 py-2 rounded-xl text-sm border border-blue-500/20"
            >
              <span
                class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"
              ></span>

              System Online
            </span>
          </div>
        </div>
      </div>
    </footer>

    <!-- MODAL CONFIRM -->
    <div
      id="modalConfirm"
      class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-[99999]"
    >
      <div
        class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 animate-[fadeIn_.2s_ease]"
      >
        <!-- TÍTULO -->
        <h2 class="text-2xl font-bold text-slate-900 mb-2">Confirmar ação</h2>

        <!-- TEXTO -->
        <p id="modalConfirmMessage" class="text-slate-600 mb-6">
          Deseja continuar?
        </p>

        <div class="flex gap-3">
          <button
            id="modalConfirmCancel"
            class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-900 py-3 rounded-xl font-medium transition"
          >
            Cancelar
          </button>

          <button
            id="modalConfirmOk"
            class="flex-1 bg-red-200 hover:bg-red-300 text-red-800 py-3 rounded-xl font-medium transition"
          >
            Excluir
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
