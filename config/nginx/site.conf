server {
    listen 80;
    server_name rubbleapp.duckdns.org;

    root /var/www/html;
    index index.html;

    server_tokens off;

    # ── Security: paths to block ──
    location = /.env               { deny all; return 403; }
    location = /composer.json      { deny all; return 403; }
    location = /composer.lock      { deny all; return 403; }
    location = /composer.phar      { deny all; return 403; }
    location = /package.json       { deny all; return 403; }
    location = /bun.lock           { deny all; return 403; }
    location = /bunfig.toml        { deny all; return 403; }
    location = /phpunit.xml        { deny all; return 403; }
    location ^~ /vendor/           { deny all; return 403; }
    location ^~ /node_modules/     { deny all; return 403; }
    location ^~ /tests/            { deny all; return 403; }
    location ^~ /OS/               { deny all; return 403; }
    location ^~ /LAUDO/            { deny all; return 403; }
    location ^~ /cache/            { deny all; return 403; }
    location ^~ /config/           { deny all; return 403; }

    # ── API: única entrada PHP ──
    location ^~ /app/api/index.php {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param QUERY_STRING     $query_string;
        fastcgi_read_timeout 120s;
        client_max_body_size 25M;
    }

    # ── Block any other .php file ──
    location ~ \.php$ {
        deny all;
        return 403;
    }

    # ── Static assets with cache ──
    location /public/ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    location /image/ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    location /app/Views/ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip ──
    gzip on;
    gzip_types application/json text/plain text/css text/javascript application/javascript image/svg+xml;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_vary on;
}
