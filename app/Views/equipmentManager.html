<div class="min-h-screen dark-gradient" style="background: linear-gradient(90deg, #b9abd9 0%, #d8e7fd 50%, #fde1f0 100%);">
  <div class="bg-slate-900 text-white shadow-lg">
    <div class="px-6 py-2 grid grid-cols-1 sm:grid-cols-3 gap-2 sm:gap-0 items-center">
      <div>
        <h1 class="text-2xl font-light tracking-[0.1em]">Equipamentos</h1>
        <p class="text-sm text-slate-400/80 mt-0.5">Gerenciamento de equipamentos</p>
      </div>

      <div class="text-center">
        <span class="inline-flex items-center justify-center bg-blue-500/20 text-blue-300 px-3 py-1 rounded-xl text-xs font-semibold">
          <span id="equipmentCounter">0</span>
          <span class="ml-1">equipamentos</span>
        </span>
      </div>

      <div class="text-right flex items-center justify-end gap-3">
        <input type="text" id="equipmentSearchInput"
          class="w-full sm:w-44 rounded-xl border border-slate-600 bg-slate-800 text-white placeholder-slate-400 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Buscar..." />
        <button onclick="window.location.hash = '#/equipmentForm'"
          class="bg-emerald-200 hover:bg-emerald-300 text-emerald-800 px-4 py-2 rounded-xl text-sm font-medium transition whitespace-nowrap">
          + Novo Equipamento
        </button>
      </div>
    </div>
  </div>

  <div class="p-4">
    <div class="bg-white dark:bg-[#1a1f2e] rounded-3xl shadow-xl border border-slate-200 dark:border-[#2d3548] overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-slate-100 text-slate-600 uppercase text-xs tracking-wider">
            <th class="text-left px-3 py-3 font-semibold">Equipamento</th>
            <th class="hidden lg:table-cell text-left px-3 py-3 font-semibold">Capacidade</th>
            <th class="hidden lg:table-cell text-left px-3 py-3 font-semibold">Local</th>
            <th class="text-left px-3 py-3 font-semibold">Localidade</th>
            <th class="hidden xl:table-cell text-left px-3 py-3 font-semibold">Mercado</th>
            <th class="hidden xl:table-cell text-left px-3 py-3 font-semibold">Endereço</th>
            <th class="text-right px-3 py-3 font-semibold w-20">Ações</th>
          </tr>
        </thead>
        <tbody id="equipmentTableBody" class="divide-y divide-slate-100"></tbody>
      </table>
    </div>

    <div id="equipmentEmpty" class="hidden text-center py-12 text-slate-400">
      Nenhum equipamento encontrado
    </div>

    <div id="equipmentLoading" class="hidden text-center py-8">
      <span class="text-slate-400">Carregando...</span>
    </div>
  </div>
</div>
