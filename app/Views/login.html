<div class="min-h-screen flex items-center justify-center px-4"
     style="background: linear-gradient(180deg, #93c5fd 0%, #bfdbfe 30%, #fecdd3 70%, #fce7f3 100%);">
  <div class="w-full max-w-sm flex flex-col items-center">
    <div class="border-t border-white/60 w-full max-w-xs"></div>

    <div class="w-full flex flex-col items-center py-12">
      <img src="/image/Monster.png" class="w-16 h-16 object-contain mb-6" />

      <h1 class="text-4xl font-light tracking-[0.2em] text-slate-800 mb-10">
        Rubble
      </h1>

      <form id="loginForm" class="w-full">

        <div class="flex items-center border-b-2 border-slate-800 pb-2 mb-8">
          <svg class="w-5 h-5 fill-slate-800 mr-4 shrink-0" viewBox="0 0 24 24">
            <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
          </svg>
          <input
            type="text"
            id="loginUsername"
            class="w-full bg-transparent border-none outline-none text-base text-slate-800 font-normal placeholder:text-slate-800/60 rounded-none caret-slate-800"
            placeholder="Usuário"
            required
            autocomplete="username"
          />
        </div>

        <div class="flex items-center border-b-2 border-slate-800 pb-2 mb-6">
          <svg class="w-5 h-5 fill-slate-800 mr-4 shrink-0" viewBox="0 0 24 24">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
          </svg>
          <input
            type="password"
            id="loginPassword"
            class="w-full bg-transparent border-none outline-none text-base text-slate-800 font-normal placeholder:text-slate-800/60 rounded-none caret-slate-800"
            placeholder="Senha"
            required
            autocomplete="current-password"
          />
          <button type="button" id="togglePassword" class="ml-2 shrink-0 p-0.5 cursor-pointer hover:opacity-60 transition-opacity">
            <svg id="eyeOpen" class="w-5 h-5 fill-slate-800" viewBox="0 0 24 24">
              <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
            </svg>
            <svg id="eyeClosed" class="w-5 h-5 fill-slate-800 hidden" viewBox="0 0 24 24">
              <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2z"/>
            </svg>
          </button>
        </div>

        <div id="loginError" class="text-red-600 text-sm text-center hidden mb-4"></div>

        <div id="turnstile-widget" class="mb-4 flex justify-center"></div>

        <button
          type="submit"
          id="loginSubmitBtn"
          class="w-full bg-slate-900 text-white py-3.5 text-sm font-semibold tracking-[0.15em] hover:bg-slate-800 active:scale-[0.99] transition-all"
        >
          ENTRAR
        </button>
      </form>
    </div>

    <div class="border-t border-white/60 w-full max-w-xs"></div>
  </div>
</div>
