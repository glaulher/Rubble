<main class="max-w-2xl mx-auto p-6">
  <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
    <div class="bg-gradient-to-r from-sky-700 to-slate-900 px-8 py-6 text-white">
      <h2 id="userFormTitle" class="text-3xl font-light tracking-[0.1em]">Novo Usuário</h2>
      <p class="text-sky-100 mt-1">Preencha as informações do usuário</p>
    </div>

    <form id="userForm" class="p-8 space-y-6">
      <input type="hidden" id="userId" />

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">E-mail</label>
        <input type="email" id="userUsername" required
          class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="email@exemplo.com" />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Nome</label>
        <input type="text" id="userNome" required
          class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Nome completo" />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Senha</label>
        <input type="password" id="userPassword" required
          class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Mínimo 6 caracteres" />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Confirmar Senha</label>
        <input type="password" id="userPasswordConfirm" required
          class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Repita a senha" />
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Permissão</label>
        <select id="userRole" required
          class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">Selecione...</option>
          <option value="admin">Admin</option>
          <option value="supervisor">Supervisor</option>
          <option value="coordenador">Coordenador</option>
          <option value="cliente">Cliente</option>
        </select>
      </div>

      <div class="flex gap-3 pt-4">
        <button type="button" onclick="window.location.hash = '#/users'"
          class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-900 py-3 rounded-xl font-medium transition">
          Cancelar
        </button>
        <button type="submit" id="userFormSubmit"
          class="flex-1 bg-blue-200 hover:bg-blue-300 text-blue-800 py-3 rounded-xl font-medium transition">
          Salvar
        </button>
      </div>
    </form>
  </div>
</main>
