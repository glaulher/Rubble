<div class="min-h-screen dark-gradient" style="background: linear-gradient(90deg, #b9abd9 0%, #d8e7fd 50%, #fde1f0 100%);">
<div class="bg-slate-900 text-white shadow-lg">
  <div class="px-6 py-2 grid grid-cols-1 sm:grid-cols-3 gap-2 sm:gap-0 items-center">
    <div>
      <h1 class="text-2xl font-light tracking-[0.1em]">Preventiva</h1>
      <p class="text-sm text-slate-400/80 mt-0.5">Ciclo de Manutenção</p>
    </div>

    <div class="text-center">
      <span class="inline-flex items-center justify-center bg-blue-500/20 text-blue-300 px-3 py-1 rounded-xl text-xs font-semibold">
        <span id="cycleCounter">0 equip. · 0 selecionados</span>
        <span class="mx-2">—</span>
        <span id="cycleValorBadge" data-role="admin coordenador">R$ 0,00</span>
      </span>
    </div>

    <div class="text-right flex items-center justify-end gap-2"></div>
  </div>
</div>

<div class="px-6 py-3 flex flex-wrap gap-4 items-end bg-white rounded-2xl shadow-sm border border-slate-200 mx-6 mt-3">
  <div class="flex flex-col">
    <label class="text-xs text-slate-500 mb-1">Ciclo</label>
    <input type="text" id="cycleInput" list="cycleOptions" autocomplete="off"
      class="bg-white text-sm rounded-lg px-3 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-36"
      placeholder="Selecionar" />
    <datalist id="cycleOptions"></datalist>
  </div>
  <div class="flex items-end gap-2">
    <button id="saveCycleBtn"
      class="bg-emerald-200 hover:bg-emerald-300 text-emerald-800 px-4 py-1.5 rounded-xl font-medium transition flex items-center gap-2 text-sm">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"></path>
        <polyline points="17 21 17 13 7 13 7 21"></polyline>
        <polyline points="7 3 7 8 15 8"></polyline>
      </svg>
      Salvar Ciclo
    </button>
  </div>
  <div class="flex items-end gap-3">
    <input type="checkbox" id="selectAllCycle" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer" />
    <label for="selectAllCycle" class="text-xs text-slate-500 mb-1 cursor-pointer">Todos</label>
  </div>
  <div class="flex items-end gap-3">
    <input type="checkbox" id="cycleCheckedOnly" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer" />
    <label for="cycleCheckedOnly" class="text-xs text-slate-500 mb-1 cursor-pointer">Apenas ticadas</label>
  </div>
  <div class="flex flex-col flex-1">
    <label class="text-xs text-slate-500 mb-1">Buscar</label>
    <input type="text" id="cycleSearch" placeholder="Equipamento, local, localidade..."
      class="bg-white text-sm rounded-lg px-3 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500" />
  </div>
</div>

<main id="cycleContent" class="p-6 space-y-6">
</main>

<div id="cycleSentinel"></div>
</div>
