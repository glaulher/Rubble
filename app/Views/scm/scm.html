<div
  class="min-h-screen dark-gradient"
  style="
    background: linear-gradient(90deg, #b9abd9 0%, #d8e7fd 50%, #fde1f0 100%);
  "
>
  <div class="bg-slate-900 text-white shadow-lg">
    <div
      class="px-6 py-2 grid grid-cols-1 sm:grid-cols-3 gap-2 sm:gap-0 items-center"
    >
      <div>
        <h1 class="text-2xl font-light tracking-[0.1em]">SCM</h1>
        <p class="text-sm text-slate-400/80 mt-0.5">Acompanhamento de Status</p>
      </div>

      <div class="text-center">
        <span
          class="inline-flex items-center justify-center bg-blue-500/20 text-blue-300 px-3 py-1 rounded-xl text-xs font-semibold"
        >
          <span id="scmCounter">0</span>
          <span class="ml-1">SCMs</span>
          <span class="mx-2">—</span>
          <span id="scmTotalValue">R$ 0,00</span>
        </span>
      </div>

      <div class="text-right flex items-center justify-end gap-2">
        <div class="relative group">
          <button
            id="importScmBtn"
            class="flex items-center justify-center bg-sky-200 hover:bg-sky-300 text-sky-800 p-2 rounded-xl transition-colors"
            data-role="admin coordenador"
          >
            <svg
              class="w-4 h-4"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
          </button>
          <span
            class="absolute top-full right-0 mt-2 scale-0 group-hover:scale-100 origin-top-right transition-transform duration-200 bg-slate-900 text-white text-xs px-3 py-2 rounded-lg whitespace-nowrap shadow-lg border border-slate-600 z-50"
          >
            Importar planilha SCM
          </span>
        </div>
      </div>
    </div>
  </div>

  <div
    id="scmFilters"
    class="px-4 py-3 flex flex-wrap gap-3 items-end bg-white rounded-2xl shadow-sm border border-slate-200 mx-6 mt-3"
  >
    <div class="flex flex-col shrink-0">
      <label class="text-xs text-slate-500 mb-1">Data Início</label>
      <input
        type="date"
        id="scmDateFrom"
        class="bg-white text-sm rounded-lg px-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-36"
      />
    </div>
    <div class="flex flex-col shrink-0">
      <label class="text-xs text-slate-500 mb-1">Data Fim</label>
      <input
        type="date"
        id="scmDateTo"
        class="bg-white text-sm rounded-lg px-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-36"
      />
    </div>
    <div class="flex flex-col relative shrink-0" id="scmSegmentContainer">
      <label class="text-xs text-slate-500 mb-1">Segmento</label>
      <button
        type="button"
        id="scmSegmentBtn"
        class="bg-white text-sm rounded-lg px-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-40 text-left flex items-center justify-between gap-1"
      >
        <span id="scmSegmentLabel" class="truncate">Todos</span>
        <svg
          class="w-4 h-4 shrink-0 text-slate-400"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div
        id="scmSegmentDropdown"
        class="hidden absolute top-full left-0 mt-1 w-56 bg-white border border-slate-200 rounded-xl shadow-lg z-50 max-h-60 overflow-y-auto"
      ></div>
    </div>
    <div class="flex flex-col relative shrink-0" id="scmSiteContainer">
      <label class="text-xs text-slate-500 mb-1">Site</label>
      <button
        type="button"
        id="scmSiteBtn"
        class="bg-white text-sm rounded-lg px-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-40 text-left flex items-center justify-between gap-1"
      >
        <span id="scmSiteLabel" class="truncate">Todos</span>
        <svg
          class="w-4 h-4 shrink-0 text-slate-400"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div
        id="scmSiteDropdown"
        class="hidden absolute top-full left-0 mt-1 w-56 bg-white border border-slate-200 rounded-xl shadow-lg z-50 max-h-60 overflow-y-auto"
      ></div>
    </div>
    <div class="flex flex-col shrink-0">
      <label class="text-xs text-slate-500 mb-1">Status</label>
      <select
        id="scmStatusFilter"
        class="bg-white text-sm rounded-lg px-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-36"
      >
        <option value="">Todos</option>
        <option value="SCM aprovado">SCM aprovado</option>
        <option value="SCM negado">SCM negado</option>
        <option value="SCM verificado">SCM verificado</option>
        <option value="SCM enviado">SCM enviado</option>
      </select>
    </div>
    <div class="flex flex-col shrink-0">
      <label class="text-xs text-slate-500 mb-1">Buscar</label>
      <input
        type="text"
        id="searchInputScm"
        placeholder="Buscar..."
        class="bg-white text-sm rounded-lg px-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-64"
      />
    </div>
  </div>

  <main id="scmContent" class="p-6 space-y-6">
    <!-- Cards SCM serão injetados aqui -->
  </main>

  <div id="scmSentinel"></div>
</div>
