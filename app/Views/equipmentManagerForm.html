<main class="max-w-2xl mx-auto p-6">
  <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
    <div class="bg-gradient-to-r from-sky-700 to-slate-900 px-8 py-6 text-white">
      <h2 id="equipmentFormTitle" class="text-3xl font-light tracking-[0.1em]">Novo Equipamento</h2>
      <p class="text-sky-100 mt-1">Preencha as informações do equipamento</p>
    </div>

    <form id="equipmentForm" class="p-8 space-y-6">
      <input type="hidden" id="equipmentId" />

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Equipamento</label>
          <input type="text" id="eqEquipamento" required
            class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ex: WM 01" />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Capacidade (TR)</label>
          <input type="number" step="0.01" id="eqCapacidade" required
            class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ex: 10" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Local (código)</label>
          <input type="text" id="eqLocal" required
            class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ex: ES, RJ" />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Localidade</label>
          <input type="text" id="eqLocalidade" required
            class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ex: Container 1" />
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">Local do Endereço</label>
          <input type="text" id="eqLocalEndereco" required
            class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Ex: Resende" />
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-2">UF</label>
          <input type="text" id="eqUf" required maxlength="2"
            class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase"
            placeholder="Ex: RJ" />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Endereço</label>
        <input type="text" id="eqEndereco" required
          class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Ex: RUA FELICIANO SODRE 660 VILA JULIETA" />
      </div>

      <div class="flex gap-3 pt-4">
        <button type="button" onclick="window.location.hash = '#/equipment-manager'"
          class="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-900 py-3 rounded-xl font-medium transition">
          Cancelar
        </button>
        <button type="submit" id="equipmentFormSubmit"
          class="flex-1 bg-blue-200 hover:bg-blue-300 text-blue-800 py-3 rounded-xl font-medium transition">
          Salvar
        </button>
      </div>
    </form>
  </div>
</main>
