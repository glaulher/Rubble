<div class="min-h-screen dark-gradient" style="background: linear-gradient(90deg, #b9abd9 0%, #d8e7fd 50%, #fde1f0 100%);">
  <!-- SUB-HEADER -->
  <div class="bg-slate-900 text-white shadow-lg">
    <div class="px-6 py-2 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-light tracking-[0.1em]">Atividade Planejada</h1>
        <p class="text-sm text-slate-400/80 mt-0.5">Acompanhamento de Atividades Programadas</p>
      </div>
      <div class="flex items-center gap-3">
        <span id="plannedCounter" class="inline-flex items-center justify-center bg-blue-500/20 text-blue-300 px-3 py-1 rounded-xl text-xs font-semibold">0</span>
        <span class="text-slate-400 text-xs">atividades</span>
        <!-- CSV -->
        <button id="btnPlannedCsv" data-role="admin coordenador" class="bg-emerald-200 hover:bg-emerald-300 text-emerald-800 p-2 rounded-xl relative group" aria-label="Exportar CSV">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="7" y1="12.5" x2="17" y2="12.5"/><line x1="7" y1="16.5" x2="17" y2="16.5"/>
          </svg>
          <span class="absolute right-0 top-[54px] scale-0 group-hover:scale-100 origin-top-right transition-transform duration-200 bg-slate-900 text-white text-xs px-3 py-2 rounded-lg whitespace-nowrap shadow-lg border border-slate-600 z-50">Exportar CSV</span>
        </button>
        <!-- WhatsApp -->
        <button id="btnPlannedWhatsApp" class="bg-emerald-200 hover:bg-emerald-300 text-emerald-800 p-2 rounded-xl relative group" aria-label="Copiar WhatsApp">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
          <span class="absolute right-0 top-[54px] scale-0 group-hover:scale-100 origin-top-right transition-transform duration-200 bg-slate-900 text-white text-xs px-3 py-2 rounded-lg whitespace-nowrap shadow-lg border border-slate-600 z-50">Copiar WhatsApp</span>
        </button>
        <!-- Nova Atividade -->
        <button id="btnNewPlanned" data-role="admin coordenador" class="bg-emerald-200 hover:bg-emerald-300 text-emerald-800 px-4 py-1.5 rounded-xl text-sm font-medium flex items-center gap-1.5">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Nova Atividade
        </button>
      </div>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="px-4 py-3 flex flex-wrap gap-3 items-end bg-white rounded-2xl shadow-sm border border-slate-200 mx-6 mt-3">
    <div class="flex flex-col shrink-0">
      <label for="plannedDateFrom" class="text-xs text-slate-500 mb-1">Data Início</label>
      <input type="date" id="plannedDateFrom" class="bg-white text-sm rounded-lg px-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-36">
    </div>
    <div class="flex flex-col shrink-0">
      <label for="plannedDateTo" class="text-xs text-slate-500 mb-1">Data Fim</label>
      <input type="date" id="plannedDateTo" class="bg-white text-sm rounded-lg px-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-36">
    </div>
    <div class="flex flex-col shrink-0">
      <label for="plannedStatusFilter" class="text-xs text-slate-500 mb-1">Status</label>
      <select id="plannedStatusFilter" class="bg-white text-sm rounded-lg px-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-40">
        <option value="">Todos</option>
        <option value="Planejado">Planejado</option>
        <option value="Concluído">Concluído</option>
        <option value="Pendente">Pendente</option>
        <option value="Em Andamento">Em Andamento</option>
        <option value="Projeto Clean Up">Projeto Clean Up</option>
      </select>
    </div>
    <div class="flex flex-col shrink-0">
      <label for="plannedSearchFilter" class="text-xs text-slate-500 mb-1">Buscar</label>
      <div class="relative">
        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="plannedSearchFilter" placeholder="Buscar" class="bg-white text-sm rounded-lg pl-8 pr-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-64">
      </div>
    </div>
  </div>

  <!-- TIMELINE CONTENT -->
  <main id="plannedContent" class="max-w-4xl mx-auto p-6 space-y-8"></main>

  <!-- SENTINEL -->
  <div id="plannedSentinel" class="h-10"></div>
</div>

<!-- MODAL: PLAN NOVA ATIVIDADE -->
<div id="modalPlanActivity" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/40">
  <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 w-full max-w-lg shadow-xl mx-4">
    <h2 class="text-lg font-semibold text-slate-800 dark:text-white mb-4">Planejar Atividade</h2>
    <form id="planForm" class="space-y-4" novalidate>
      <div>
        <label for="planSite" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Site</label>
        <div class="autocomplete-wrap relative">
          <input
            id="planSite"
            type="text"
            autocomplete="off"
            class="w-full border border-slate-300 dark:border-slate-600 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500 dark:bg-slate-700 dark:text-white"
            placeholder="Digite o site..."
          >
          <div class="site-dropdown hidden absolute left-0 right-0 top-full mt-1 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl shadow-lg z-50 max-h-48 overflow-y-auto"></div>
        </div>
      </div>
      <div>
        <label for="planEquipamento" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Equipamento</label>
        <div class="autocomplete-wrap relative">
          <input
            id="planEquipamento"
            type="text"
            required
            autocomplete="off"
            class="w-full border border-slate-300 dark:border-slate-600 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500 dark:bg-slate-700 dark:text-white"
            placeholder="Digite o nome do equipamento..."
          >
          <input id="planEquipamentoId" type="hidden" name="equipamento_id">
          <div class="equipamento-dropdown hidden absolute left-0 right-0 top-full mt-1 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl shadow-lg z-50 max-h-48 overflow-y-auto"></div>
        </div>
      </div>
      <div>
        <label for="planOs" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Nº OS</label>
        <input
          id="planOs"
          type="text"
          required
          pattern="[a-zA-Z0-9]+"
          class="w-full border border-slate-300 dark:border-slate-600 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500 dark:bg-slate-700 dark:text-white"
          placeholder="Ex: 123456"
        >
      </div>
      <div>
        <label for="planData" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Data Planejada</label>
        <input
          id="planData"
          type="date"
          required
          class="w-full border border-slate-300 dark:border-slate-600 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500 dark:bg-slate-700 dark:text-white"
        >
      </div>
      <div>
        <label for="planEquipe" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Equipe / Técnico</label>
        <input
          id="planEquipe"
          type="text"
          class="w-full border border-slate-300 dark:border-slate-600 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500 dark:bg-slate-700 dark:text-white"
          placeholder="A definir"
        >
      </div>
      <div>
        <label for="planObs" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Observação</label>
        <textarea
          id="planObs"
          rows="3"
          maxlength="1000"
          class="w-full border border-slate-300 dark:border-slate-600 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500 dark:bg-slate-700 dark:text-white"
        ></textarea>
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          id="btnCancelPlan"
          class="bg-slate-200 hover:bg-slate-300 text-slate-900 px-4 py-2 rounded-xl text-sm"
        >Cancelar</button>
        <button
          type="submit"
          class="bg-emerald-200 hover:bg-emerald-300 text-emerald-800 px-4 py-2 rounded-xl text-sm font-medium"
        >Planejar</button>
      </div>
    </form>
  </div>
</div>
