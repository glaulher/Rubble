          </svg>
          <span class="absolute right-0 top-[54px] scale-0 group-hover:scale-100 origin-top-right transition-transform duration-200 bg-slate-900 text-white text-xs px-3 py-2 rounded-lg whitespace-nowrap shadow-lg border border-slate-600 z-50">Exportar CSV</span>

            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <span class="absolute right-0 top-[54px] scale-0 group-hover:scale-100 origin-top-right transition-transform duration-200 bg-slate-900 text-white text-xs px-3 py-2 rounded-lg whitespace-nowrap shadow-lg border border-slate-600 z-50">Nova Atividade</span>
        </button>
      </div>

  <!-- FILTER BAR -->
  <div class="px-4 py-3 flex flex-wrap gap-3 items-end bg-white rounded-2xl shadow-sm border border-slate-200 mx-6 mt-3">
    <div class="flex flex-col shrink-0">
      <label for="plannedDateFrom" class="text-xs text-slate-500 mb-1">Data Início</label>
      <input type="date" id="plannedDateFrom" class="bg-white text-sm rounded-lg px-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-36">
    </div>
    <div class="flex flex-col shrink-0">
      <label for="plannedDateTo" class="text-xs text-slate-500 mb-1">Data Fim</label>
      <input type="date" id="plannedDateTo" class="bg-white text-sm rounded-lg px-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-36">
    </div>
    <div class="flex flex-col shrink-0">
      <label for="plannedStatusFilter" class="text-xs text-slate-500 mb-1">Status</label>
      <select id="plannedStatusFilter" class="bg-white text-sm rounded-lg px-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-40">
        <option value="">Todos</option>
        <option value="Planejado">Planejado</option>
        <option value="Concluído">Concluído</option>
        <option value="Pendente">Pendente</option>
        <option value="Em Andamento">Em Andamento</option>

      </select>

      <label for="plannedSearchFilter" class="text-xs text-slate-500 mb-1">Buscar</label>

        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="plannedSearchFilter" placeholder="Buscar" class="bg-white text-sm rounded-lg pl-8 pr-2 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-64">
      </div>
    </div>

  <!-- TIMELINE CONTENT -->
  <main id="plannedContent" class="max-w-4xl mx-auto p-6 space-y-8"></main>

  <!-- SENTINEL -->
  <div id="plannedSentinel" class="h-10"></div>
</div>

<!-- MODAL: PLAN NOVA ATIVIDADE -->
<div id="modalPlanActivity" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/40">
  <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-xl mx-4 max-h-[90vh] overflow-y-auto">
    <h2 class="text-lg font-semibold text-slate-800 mb-4">Planejar Atividade</h2>
    <form id="planForm" class="space-y-4" novalidate>
      <div>
        <label for="planSite" class="block text-sm font-medium text-slate-700 mb-1">Site</label>
        <div class="autocomplete-wrap relative">
          <input
            id="planSite"
            type="text"
            autocomplete="off"
            class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500"
            placeholder="Digite o site..."
          >
          <div class="site-dropdown hidden absolute left-0 right-0 top-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg z-50 max-h-48 overflow-y-auto"></div>
        </div>
      </div>
      <div>
        <label for="planTipo" class="block text-sm font-medium text-slate-700 mb-1">Tipo</label>
        <select
          id="planTipo"
          required
          class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500"
        >
          <option value="">Selecione</option>
          <option value="preventiva">Preventiva</option>
          <option value="corretiva">Corretiva</option>
        </select>
      </div>
      <!-- Preventiva fields -->
      <div id="preventivaFields" class="hidden space-y-4">
        <div>
          <label for="planTicket" class="block text-sm font-medium text-slate-700 mb-1">Nº Ticket</label>
          <input
            id="planTicket"
            type="text"
            class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500"
            placeholder="Ex: 123"
          >
        </div>
      </div>
      <!-- Corretiva fields -->
      <div id="corretivaFields" class="hidden space-y-4">
        <div>
          <label for="planEquipamento" class="block text-sm font-medium text-slate-700 mb-1">Equipamento</label>
          <div class="autocomplete-wrap relative">
            <input
              id="planEquipamento"
              type="text"
              required
              autocomplete="off"
              class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500"
              placeholder="Digite o nome do equipamento..."
            >
            <input id="planEquipamentoId" type="hidden" name="equipamento_id">
            <div class="equipamento-dropdown hidden absolute left-0 right-0 top-full mt-1 bg-white border border-slate-200 rounded-xl shadow-lg z-50 max-h-48 overflow-y-auto"></div>
          </div>
        </div>
        <div>
          <label for="planOs" id="planOsLabel" class="block text-sm font-medium text-slate-700 mb-1">Nº OS</label>
          <input
            id="planOs"
            type="text"
            required
            pattern="[a-zA-Z0-9]+"
            class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500"
            placeholder="Ex: 123456"
          >
        </div>
      </div>
      <div>
        <label for="planData" class="block text-sm font-medium text-slate-700 mb-1">Data Planejada</label>
        <input
          id="planData"
          type="date"
          required
          class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500"
        >
      </div>
      <div>
        <label for="planEquipe" class="block text-sm font-medium text-slate-700 mb-1">Equipe / Técnico</label>
        <input
          id="planEquipe"
          type="text"
          class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500"
          placeholder="A definir"
        >
      </div>
      <!-- SLA -->
      <div class="border-t border-slate-200 pt-4">
        <label class="block text-sm font-medium text-slate-700 mb-2">SLA (dias programados)</label>
        <div class="flex items-center gap-4">
          <input
            id="planSlaDays"
            type="number"
            min="1"
            max="90"
            class="w-20 border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500"
            placeholder="4"
          >
          <label class="flex items-center gap-1.5 text-sm text-slate-600 cursor-pointer">
            <input type="checkbox" id="planSlaSat" class="rounded border-slate-300 text-sky-600">
            Sáb
          </label>
          <label class="flex items-center gap-1.5 text-sm text-slate-600 cursor-pointer">
            <input type="checkbox" id="planSlaSun" class="rounded border-slate-300 text-sky-600">
            Dom
          </label>
        </div>
        <div id="slaPreview" class="mt-2 text-xs text-slate-400 hidden">
          <span id="slaPreviewText"></span>
        </div>
      </div>
      <div>
        <label for="planObs" class="block text-sm font-medium text-slate-700 mb-1">Observação</label>
        <textarea
          id="planObs"
          rows="3"
          maxlength="1000"
          class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500"
        ></textarea>
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          id="btnCancelPlan"
          class="bg-slate-300 hover:bg-slate-400 text-slate-900 px-4 py-2 rounded-xl text-sm transition"
        >Cancelar</button>
        <button
          type="submit"
          class="bg-emerald-300 hover:bg-emerald-400 text-emerald-800 px-4 py-2 rounded-xl text-sm font-medium"
        >Planejar</button>
      </div>
    </form>
  </div>
</div>

<!-- Status Update Modal (Preventiva) -->
<div id="modalStatusPreventiva" class="fixed inset-0 z-50 flex items-center justify-center hidden">
  <div class="absolute inset-0 bg-black/40" id="modalStatusBackdrop"></div>
  <div class="relative bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm mx-4 z-10">

      <div class="mb-4">
        <label for="statusSelect" class="block text-sm font-medium text-slate-700 mb-1">Novo Status</label>
        <select
          id="statusSelect"
          required
          class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500"
        ></select>
      </div>

        <label for="statusDataPlanejada" class="block text-sm font-medium text-slate-700 mb-1">Nova Data Planejada</label>

          id="statusDataPlanejada"

          class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500"

        <label for="statusObs" class="block text-sm font-medium text-slate-700 mb-1">Observação (opcional)</label>

          class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500"

        <button type="button" id="btnCancelStatus" class="bg-slate-200 hover:bg-slate-300 text-slate-900 px-4 py-2 rounded-xl text-sm">Cancelar</button>
        <button type="submit" class="bg-blue-200 hover:bg-blue-300 text-blue-800 px-4 py-2 rounded-xl text-sm font-medium">Confirmar</button>

</div>

<!-- Status Update Modal (Corretiva) -->
<div id="modalStatusCorretiva" class="fixed inset-0 z-50 flex items-center justify-center hidden">
  <div class="absolute inset-0 bg-black/40" id="modalCorretivaStatusBackdrop"></div>
  <div class="relative bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm mx-4 z-10">
    <h3 class="text-lg font-semibold text-slate-800 mb-4">Alterar Status</h3>
    <form id="corretivaStatusForm" novalidate>
      <input type="hidden" id="corretivaStatusId">
      <div class="mb-4">
        <label for="corretivaStatusSelect" class="block text-sm font-medium text-slate-700 mb-1">Novo Status</label>

          id="corretivaStatusSelect"

      <div class="flex justify-end gap-3">
        <button type="button" class="btn-cancel-corretiva-status bg-slate-200 hover:bg-slate-300 text-slate-900 px-4 py-2 rounded-xl text-sm">Cancelar</button>

</div>

<!-- MODAL: EXTENDER SLA -->
<div id="modalExtendSla" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/40">
  <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl mx-4">
    <h2 class="text-lg font-semibold text-slate-800 mb-1">Estender SLA</h2>
    <p id="extendSlaInfo" class="text-sm text-slate-500 mb-4"></p>
    <form id="extendSlaForm" class="space-y-4" novalidate>
      <input type="hidden" id="extendSlaId">
      <input type="hidden" id="extendSlaTipo">
      <div>
        <label for="extendSlaDays" class="block text-sm font-medium text-slate-700 mb-1">Dias extras</label>
        <input
          id="extendSlaDays"
          type="number"
          min="1"
          max="30"
          required
          class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-sky-500"
          placeholder="Ex: 3"
        >
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">Justificativa</label>
        <div id="extendSlaReasons" class="space-y-2">
          <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
            <input type="radio" name="sla_justification" value="Condições climáticas" class="accent-sky-600">
            Condições climáticas
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
            <input type="radio" name="sla_justification" value="Material parceiro" class="accent-sky-600">
            Material parceiro
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
            <input type="radio" name="sla_justification" value="Sem acesso" class="accent-sky-600">
            Sem acesso
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
            <input type="radio" name="sla_justification" value="Material cliente" class="accent-sky-600">
            Material cliente
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
            <input type="radio" name="sla_justification" value="Reprogramado equipe parceiro" class="accent-sky-600">
            Reprogramado equipe parceiro
          </label>
          <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
            <input type="radio" name="sla_justification" value="Reprogramado equipe cliente" class="accent-sky-600">
            Reprogramado equipe cliente
          </label>
        </div>
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" id="btnCancelExtendSla" class="bg-slate-300 hover:bg-slate-400 text-slate-900 px-4 py-2 rounded-xl text-sm transition">Cancelar</button>
        <button type="submit" class="bg-amber-200 hover:bg-amber-300 text-amber-800 px-4 py-2 rounded-xl text-sm font-medium">Estender</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL: DEFINIR SLA -->

          id="setSlaDays"
