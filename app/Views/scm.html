<div class="bg-slate-900 text-white shadow-lg">
  <div class="px-6 py-2 grid grid-cols-1 sm:grid-cols-3 gap-2 sm:gap-0 items-center">
    <div>
      <h1 class="text-2xl font-light tracking-[0.1em]">SCM</h1>
      <p class="text-sm text-slate-400/80 mt-0.5">Acompanhamento de Status</p>
    </div>

    <div class="text-center">
      <span class="inline-flex items-center justify-center bg-blue-500/20 text-blue-300 px-3 py-1 rounded-xl text-xs font-semibold">
        <span id="scmCounter">0</span>
        <span class="ml-1">SCMs</span>
        <span class="mx-2">—</span>
        <span id="scmTotalValue">R$ 0,00</span>
      </span>
    </div>

    <div class="text-right flex items-center justify-end gap-2">
      <input
        type="text"
        id="searchInputScm"
        placeholder="Buscar SCM..."
        class="bg-slate-800 text-white text-sm rounded-lg px-3 py-1.5 border border-slate-700 focus:outline-none focus:border-blue-500 w-48"
      />
      <button
        id="importScmBtn"
        class="bg-sky-200 hover:bg-sky-300 text-sky-800 px-3 py-1.5 rounded-xl text-sm font-medium transition-colors"
        data-role="admin coordenador"
      >
        Importar CSV
      </button>
    </div>
  </div>
</div>

<main id="scmContent" class="p-6 space-y-6">
  <!-- Cards SCM serão injetados aqui -->
</main>

<div id="scmSentinel"></div>
