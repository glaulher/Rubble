<div class="bg-slate-900 text-white shadow-lg">
  <div class="px-6 py-2 grid grid-cols-1 sm:grid-cols-3 gap-2 sm:gap-0 items-center">
    <div>
      <h1 class="text-2xl font-light tracking-[0.1em]">SCM</h1>
      <p class="text-sm text-slate-400/80 mt-0.5">Acompanhamento de Status</p>
    </div>

    <div class="text-center">
      <span class="inline-flex items-center justify-center bg-blue-500/20 text-blue-300 px-3 py-1 rounded-xl text-xs font-semibold">
        <span id="scmCounter">0</span>
        <span class="ml-1">SCMs</span>
        <span class="mx-2">—</span>
        <span id="scmTotalValue">R$ 0,00</span>
      </span>
    </div>

    <div class="text-right flex items-center justify-end gap-2">
      <div class="relative group">
        <button
          id="importScmBtn"
          class="flex items-center gap-2 bg-sky-200 hover:bg-sky-300 text-sky-800 px-3 py-1.5 rounded-xl text-sm font-medium transition-colors"
          data-role="admin coordenador"
        >
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          Importar CSV
        </button>
        <span class="absolute bottom-full right-0 mb-2 scale-0 group-hover:scale-100 origin-bottom-right transition-transform duration-200 bg-slate-900 text-white text-xs px-3 py-2 rounded-lg whitespace-nowrap shadow-lg border border-slate-600 z-50">Importar planilha SCM</span>
      </div>
    </div>
  </div>
</div>

<div id="scmFilters" class="px-6 py-3 flex flex-wrap gap-4 items-end bg-white rounded-2xl shadow-sm border border-slate-200 mx-6 mt-3">
  <div class="flex flex-col">
    <label class="text-xs text-slate-500 mb-1">Data Início</label>
    <input type="date" id="scmDateFrom"
      class="bg-white text-sm rounded-lg px-3 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-40" />
  </div>
  <div class="flex flex-col">
    <label class="text-xs text-slate-500 mb-1">Data Fim</label>
    <input type="date" id="scmDateTo"
      class="bg-white text-sm rounded-lg px-3 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-40" />
  </div>
  <div class="flex flex-col">
    <label class="text-xs text-slate-500 mb-1">Segmento</label>
    <input type="text" id="scmSegmentFilter" list="segmentoList" placeholder="Todos"
      class="bg-white text-sm rounded-lg px-3 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500 w-48" />
    <datalist id="segmentoList"></datalist>
  </div>
  <div class="flex flex-col flex-1">
    <label class="text-xs text-slate-500 mb-1">Buscar</label>
    <input type="text" id="searchInputScm" placeholder="Buscar SCM, mercado..."
      class="bg-white text-sm rounded-lg px-3 py-1.5 border border-slate-300 focus:outline-none focus:border-blue-500" />
  </div>
</div>

<main id="scmContent" class="p-6 space-y-6">
  <!-- Cards SCM serão injetados aqui -->
</main>

<div id="scmSentinel"></div>
